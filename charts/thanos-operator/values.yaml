## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: ghcr.io/opnpulse/thanos-operator
    tag: v2026.4.24
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect
    - --metrics-secure
    - --log.format=logfmt
    - --log.level=debug
    - --enable-feature=service-monitor
    - --enable-feature=prometheus-rule
    - --enable-feature=kube-resource-sync
  #    - --enable-feature=otel-sidecar
  #    - --zap-encoder=console
  #    - --zap-log-level=debug

  ## Environment variables
  ##
  env: []

  ## Env overrides (--set manager.envOverrides.VAR=value)
  ## Same name in env above: this value takes precedence.
  ##
  envOverrides: {}

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  ## Resource limits and requests
  ##
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: false

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: false
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8443

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

## ThanosRuler configuration.
##
thanosRuler:
  enabled: false
  storage:
    size: 2Gi
  additionalArgs: []
  # - --query.config-file=/etc/ruler/query.yaml
  # - --remote-write.config-file=/etc/ruler-rw/remote-write.yaml
  additionalVolumeMounts: []
  # - mountPath: /etc/thanos/certs
  #   name: thanos-certs
  #   readOnly: true
  additionalVolumes: []
  # - name: thanos-certs
  #   secret:
  #     secretName: tls-ssl-minio
  #     items:
  #       - key: public.crt
  #         path: public.crt
  monitoringClusterBaseURL: ""

## S3-compatible object storage configuration for Thanos.
## When enabled, creates the thanos-object-storage-secret.
##
objectStorage:
  bucket: ""
  endpoint: ""
  accessKey: ""
  secretKey: ""
  prefix: "metrics"
  region: "us-east-1"
