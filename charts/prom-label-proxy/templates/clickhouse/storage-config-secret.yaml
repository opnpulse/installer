{{- if and .Values.clickhouse.enabled .Values.clickhouse.s3.endpoint }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prom-label-proxy.fullname" . }}-clickhouse-storage-config
  namespace: {{ template "prom-label-proxy.namespace" . }}
  labels:
    {{- include "prom-label-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  storage.xml: |
    <clickhouse>
        <storage_configuration>
            <disks>
                <local>
                    <path>/var/lib/clickhouse/hot/</path>
                </local>
                <s3>
                    <type>s3</type>
                    <endpoint>{{ .Values.clickhouse.s3.endpoint }}/{{ .Values.clickhouse.s3.bucket }}/{{ .Values.clickhouse.s3.prefix }}</endpoint>
                    <access_key_id>{{ .Values.clickhouse.s3.accessKey }}</access_key_id>
                    <secret_access_key>{{ .Values.clickhouse.s3.secretKey }}</secret_access_key>
                    <region>{{ .Values.clickhouse.s3.region }}</region>
                    <metadata_path>/var/lib/clickhouse/disks/s3_disk/</metadata_path>
                    <skip_verify>{{ .Values.clickhouse.s3.skipVerify }}</skip_verify>
                </s3>
            </disks>
            <policies>
                <tiered>
                    <volumes>
                        <hot>
                            <disk>local</disk>
                        </hot>
                        <cold>
                            <disk>s3</disk>
                        </cold>
                    </volumes>
                </tiered>
            </policies>
        </storage_configuration>
    </clickhouse>
{{- end }}
