{{- if (eq .Values.infra.tls.issuer "ca") }}

{{- $data := dict
    "tls.crt" .Values.infra.tls.ca.cert
    "tls.key" .Values.infra.tls.ca.key
}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "prom-label-proxy.name" . }}-gw-ca
  namespace: {{ template "prom-label-proxy.namespace" . }}
  labels:
    {{- include "prom-label-proxy.labels" . | nindent 4 }}
type: kubernetes.io/tls
stringData: {{ $data | toJson }}
{{- end }}
